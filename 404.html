<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — ФизМатИнфо</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            --red: #e8272a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: var(--text-color);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* ФОНОВЫЕ ШАРЫ */
        .background-orbs {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; opacity: 0.5; filter: blur(60px);
        }
        .orb-1 { width: 400px; height: 400px; background: radial-gradient(#4f46e5, #0ea5e9);
            top: -10%; left: -10%; animation: moveDiagonal 15s infinite alternate ease-in-out; }
        .orb-2 { width: 300px; height: 300px; background: radial-gradient(#06b6d4, #3b82f6);
            bottom: 10%; right: -5%; animation: moveVertical 12s infinite alternate ease-in-out; }
        .orb-3 { width: 250px; height: 250px; background: radial-gradient(#8b5cf6, #6366f1);
            top: 40%; left: 40%; animation: moveCircular 20s infinite linear; }
        .orb-4 { width: 200px; height: 200px; background: radial-gradient(#f59e0b, #ef4444);
            bottom: 20%; left: 20%; animation: moveWild 16s infinite ease-in-out; opacity: 0.4; }

        @keyframes moveDiagonal { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(300px,200px) scale(1.1); } }
        @keyframes moveVertical { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(-150px) scale(1.1); } }
        @keyframes moveCircular { 0% { transform: rotate(0deg) translateX(120px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(120px) rotate(-360deg); } }
        @keyframes moveWild { 0%,100% { transform: translate(0,0) scale(1); } 25% { transform: translate(100px,-100px) scale(1.2); } 50% { transform: translate(200px,50px) scale(0.9); } 75% { transform: translate(-50px,150px) scale(1.1); } }

        /* ГЛАВНАЯ КАРТОЧКА */
        .hero-404 { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(20px); border: var(--glass-border);
            border-radius: 24px; box-shadow: var(--shadow); padding: 3rem 2.5rem; max-width: 500px; width: 100%;
            position: relative; overflow: hidden;
        }
        .glass-card::before {
            content: ''; position: absolute; inset: 0; background: radial-gradient(circle at top left, rgba(79,70,229,0.15), transparent);
            pointer-events: none;
        }
        .glass-card-inner { position: relative; z-index: 2; }

        .error-code {
            font-size: 6rem; font-weight: 900; background: linear-gradient(135deg, #4f46e5 0%, #ec4899 50%, #f59e0b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin: 0 0 1rem; animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow { 0% { filter: drop-shadow(0 0 20px rgba(79,70,229,0.6)); } 100% { filter: drop-shadow(0 0 40px rgba(236,72,153,0.8)); } }

        .error-title { font-size: 1.75rem; font-weight: 800; margin-bottom: 1rem; }
        .error-desc { opacity: 0.9; margin-bottom: 2.5rem; line-height: 1.6; }

        .btn-home {
            background: linear-gradient(135deg, #38bdf8, #0ea5e9); border: none; color: white !important;
            border-radius: 16px; padding: 1.25rem 2.5rem; font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 16px 40px rgba(56,189,248,0.4); transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.75rem;
        }
        .btn-home:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 24px 60px rgba(56,189,248,0.6); }

        .logo-footer {
            position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.1); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.2);
            color: white; font-weight: 900; font-size: 1.2rem; padding: 1rem 2rem; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        @media (max-width: 576px) {
            .glass-card { margin: 1rem; padding: 2rem 1.5rem; }
            .error-code { font-size: 4rem; }
            .hero-404 { padding: 1rem; }
        }
    </style>
</head>
<body>
    <!-- ШАРЫ -->
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="hero-404">
        <div class="glass-card">
            <div class="glass-card-inner">
                <i class="bi bi-exclamation-triangle display-3 text-warning mb-4"></i>
                <div class="error-code">404</div>
                <h1 class="error-title mb-3">Страница не найдена</h1>
                <p class="error-desc fs-5 mb-5">
                    Запрашиваемая страница не существует. 
                    Возможно, ссылка устарела или страница была удалена.
                </p>
                <a href="index.html" class="btn-home">
                    <i class="bi bi-house-door-fill"></i>
                    Вернуться на главную
                    <img class="box-shadow" width="50" height="50" src="favicon.png">
                </a>
            </div>
        </div>
        
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
